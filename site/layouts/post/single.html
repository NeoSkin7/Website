{{ define "main" }}

<div class="mw6 center ph3 pv4">
  <h1 class="f2 lh-title b mb3">{{.Title}}</h1>
  <div class="flex flex-wrap justify-between grey-4">
    <p>{{ .Date.Format "Mon, 2 Jan, 2006" }}</p>
    <p>Read in {{ .ReadingTime }} minutes</p>
    {{ if .Params.tags }}
    <div class="tag-group">
      {{ range .Params.tags }}
      <span class="tag-text">
        <a href="/tags/{{. | urlize }}">{{.}}</a>
      </span>
      &nbsp;
      {{end}}
      {{ end }}
    </div>
    <div class="cms mw6">
      <p>{{ .Description }}</p>
      {{ if .Params.image }}<img src="{{ .Params.image }}" alt="{{ .Title }}" />{{ end }}
      {{ .Content }}
    </div>
  </div>
  {{ end }}
